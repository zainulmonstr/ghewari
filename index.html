<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghewari Special Website</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
        }
        
        .brand-credit {
            font-size: 35px;
            font-weight: 900;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #ff416c, #ff4b2b, #00b4db, #0083b0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulseScale 2s infinite alternate;
        }

        @keyframes pulseScale { 0% { transform: scale(1); } 100% { transform: scale(1.03); } }

        .main-image { max-width: 200px; height: auto; border-radius: 10px; margin-bottom: 20px; border: 3px solid #eee; }

        #game-area {
            width: 100%;
            height: 400px;
            background-color: #f9f9f9;
            position: relative;
            overflow: hidden;
            border: 3px solid #2196f3;
            border-radius: 10px;
            cursor: grab;
            display: none; 
            margin: 20px auto 0 auto;
            touch-action: none;
        }

        .falling-item {
            width: 50px;
            height: 50px;
            position: absolute;
            top: -50px;
            user-select: none;
            pointer-events: none;
        }

        #basket {
            width: 100px;
            height: 25px;
            background-color: #ff4757;
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(255, 71, 87, 0.6);
            pointer-events: none;
        }

        /* काउंटडाउन के लिए */
        #countdown {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 60px;
            font-weight: bold;
            color: #2196f3;
            display: none;
            z-index: 10;
        }

        #score-board { font-size: 24px; font-weight: bold; color: #333; margin: 15px 0; }
        .btn { background-color: #2196f3; color: white; padding: 12px 30px; border: none; border-radius: 25px; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="brand-credit">Made by Zainul</div>
    <img src="ghewari.png" alt="Ghewari Image" class="main-image">

    <div id="score-board">स्कोर: <span id="score">0</span></div>
    <button class="btn" id="start-btn" onclick="startCountdown()">गेम चालू करें 🎮</button>

    <div id="game-area">
        <div id="countdown">3</div>
        <div id="basket"></div>
    </div>
</div>

<script>
    const gameArea = document.getElementById('game-area');
    const basket = document.getElementById('basket');
    const scoreDisplay = document.getElementById('score');
    const startBtn = document.getElementById('start-btn');
    const countdownEl = document.getElementById('countdown');

    let score = 0;
    let gameInterval;
    let isPlaying = false;
    let basketX = 150;

    // --- काउंटडाउन लॉजिक ---
    function startCountdown() {
        startBtn.style.display = 'none';
        gameArea.style.display = 'block';
        countdownEl.style.display = 'block';
        
        let count = 3;
        countdownEl.innerText = count;
        
        let timer = setInterval(() => {
            count--;
            if (count > 0) {
                countdownEl.innerText = count;
            } else if (count === 0) {
                countdownEl.innerText = "GO!";
            } else {
                clearInterval(timer);
                countdownEl.style.display = 'none';
                initGame();
            }
        }, 1000);
    }

    function initGame() {
        isPlaying = true;
        score = 0;
        scoreDisplay.innerText = score;
        basketX = gameArea.offsetWidth / 2;
        moveBasketSmoothly(basketX);
        gameInterval = setInterval(createFallingImage, 900);
    }

    // --- कोलाइडर और मूवमेंट लॉजिक ---
    gameArea.addEventListener('mousemove', (e) => { if(isPlaying) moveBasketSmoothly(e.clientX - gameArea.getBoundingClientRect().left); });
    gameArea.addEventListener('touchmove', (e) => { if(isPlaying) moveBasketSmoothly(e.touches[0].clientX - gameArea.getBoundingClientRect().left); });

    function moveBasketSmoothly(newX) {
        const half = basket.offsetWidth / 2;
        if (newX < half) newX = half;
        if (newX > gameArea.offsetWidth - half) newX = gameArea.offsetWidth - half;
        basketX = newX;
        basket.style.left = (basketX - half) + 'px';
    }

    function createFallingImage() {
        if (!isPlaying) return;
        const img = document.createElement('img');
        img.src = 'ghewari.png';
        img.classList.add('falling-item');
        const maxX = gameArea.offsetWidth - 50;
        img.style.left = Math.floor(Math.random() * maxX) + 'px';
        gameArea.appendChild(img);

        let posY = -50;
        let speed = 5;

        function fall() {
            if (!isPlaying) { img.remove(); return; }
            posY += speed;
            img.style.top = posY + 'px';
            
            // कोलाइडर: यहाँ गणित एकदम सटीक है
            if (posY >= 355 && posY <= 370) {
                const imgLeft = parseInt(img.style.left);
                const imgRight = imgLeft + 50;
                const basketLeft = basketX - (basket.offsetWidth / 2);
                const basketRight = basketX + (basket.offsetWidth / 2);

                // अगर इमेज और बास्केट का एरिया ओवरलैप होता है
                if (imgRight >= basketLeft && imgLeft <= basketRight) {
                    score++;
                    scoreDisplay.innerText = score;
                    img.remove();
                    return;
                }
            }

            if (posY > 400) { img.remove(); gameOver(); } 
            else { requestAnimationFrame(fall); }
        }
        requestAnimationFrame(fall);
    }

    function gameOver() {
        isPlaying = false;
        clearInterval(gameInterval);
        alert('गेम ओवर! आपका फाइनल स्कोर: ' + score);
        startBtn.style.display = 'inline-block';
        startBtn.innerText = 'फिर से खेलें 🔄';
        gameArea.style.display = 'none';
    }
</script>

</body>
</html>
