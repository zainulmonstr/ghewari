<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghewari Special Website</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        .brand-credit { font-size: 32px; font-weight: 900; margin-bottom: 20px; background: linear-gradient(45deg, #ff416c, #ff4b2b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* बड़ी इमेज स्टाइल */
        .main-image { width: 100%; max-width: 350px; height: auto; border-radius: 15px; margin-bottom: 25px; border: 5px solid #fff; box-shadow: 0 8px 20px rgba(0,0,0,0.15); }

        #game-area { width: 100%; height: 400px; background-color: #f9f9f9; position: relative; overflow: hidden; border: 3px solid #2196f3; border-radius: 10px; cursor: grab; display: none; margin: 0 auto; touch-action: none; }
        
        .falling-item { width: 45px; height: 45px; position: absolute; top: -50px; pointer-events: none; }
        
        #basket { width: 90px; height: 25px; background-color: #ff4757; position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); border-radius: 10px; box-shadow: 0 4px 10px rgba(255, 71, 87, 0.6); pointer-events: none; }

        #countdown { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 60px; font-weight: bold; color: #2196f3; display: none; }
        
        #score-board { font-size: 24px; font-weight: bold; margin-bottom: 15px; display: none; }
        .btn { background-color: #2196f3; color: white; padding: 15px 40px; border: none; border-radius: 30px; font-size: 20px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(33, 150, 243, 0.4); transition: 0.3s; }
        .btn:hover { background-color: #1976d2; transform: scale(1.05); }
    </style>
</head>
<body>

<div class="container">
    <div class="brand-credit">Made by Zainul</div>
    
    <!-- बड़ी फोटो -->
    <img src="ghewari.png" alt="Ghewari Image" class="main-image">
    
    <div id="score-board">स्कोर: <span id="score">0</span></div>
    <button class="btn" id="start-btn" onclick="startCountdown()">गेम चालू करें 🎮</button>

    <div id="game-area">
        <div id="countdown">3</div>
        <div id="basket"></div>
    </div>
</div>

<script>
    const gameArea = document.getElementById('game-area');
    const basket = document.getElementById('basket');
    const scoreDisplay = document.getElementById('score');
    const scoreBoard = document.getElementById('score-board');
    const startBtn = document.getElementById('start-btn');
    const countdownEl = document.getElementById('countdown');
    const mainImg = document.querySelector('.main-image');

    let score = 0;
    let gameInterval;
    let isPlaying = false;
    let basketX = 250;
    let fallingSpeed = 4;

    let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(freq) {
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    function startCountdown() {
        startBtn.style.display = 'none';
        mainImg.style.display = 'none'; // फोटो छुपाएं
        scoreBoard.style.display = 'block'; // स्कोर दिखाएं
        gameArea.style.display = 'block';
        countdownEl.style.display = 'block';
        
        let count = 3;
        countdownEl.innerText = count;
        let timer = setInterval(() => {
            count--;
            if (count > 0) countdownEl.innerText = count;
            else if (count === 0) countdownEl.innerText = "GO!";
            else { clearInterval(timer); countdownEl.style.display = 'none'; initGame(); }
        }, 1000);
    }

    function initGame() {
        isPlaying = true;
        score = 0;
        fallingSpeed = 4;
        scoreDisplay.innerText = score;
        gameInterval = setInterval(createFallingImage, 800);
    }

    function moveBasket(clientX) {
        const containerRect = gameArea.getBoundingClientRect();
        let relativeX = clientX - containerRect.left;
        const half = 45;
        if (relativeX < half) relativeX = half;
        if (relativeX > gameArea.offsetWidth - half) relativeX = gameArea.offsetWidth - half;
        basketX = relativeX;
        basket.style.left = (basketX - half) + 'px';
    }

    gameArea.addEventListener('mousemove', (e) => { if(isPlaying) moveBasket(e.clientX); });
    gameArea.addEventListener('touchmove', (e) => { if(isPlaying) moveBasket(e.touches[0].clientX); });

    function createFallingImage() {
        if (!isPlaying) return;
        const img = document.createElement('img');
        img.src = 'ghewari.png';
        img.classList.add('falling-item');
        const maxX = gameArea.offsetWidth - 45;
        img.style.left = Math.floor(Math.random() * maxX) + 'px';
        gameArea.appendChild(img);

        let posY = -50;
        
        function fall() {
            if (!isPlaying) { img.remove(); return; }
            posY += fallingSpeed;
            img.style.top = posY + 'px';
            
            if (posY >= 350 && posY <= 370) {
                const imgLeft = parseFloat(img.style.left);
                const imgRight = imgLeft + 45;
                const basketLeft = basketX - 45;
                const basketRight = basketX + 45;

                if (imgRight > basketLeft && imgLeft < basketRight) {
                    score++;
                    playSound(600);
                    scoreDisplay.innerText = score;
                    if(score % 3 === 0) fallingSpeed += 0.5;
                    img.remove();
                    return;
                }
            }

            if (posY > 400) { img.remove(); gameOver(); } 
            else { requestAnimationFrame(fall); }
        }
        fall();
    }

    function gameOver() {
        isPlaying = false;
        clearInterval(gameInterval);
        alert('गेम ओवर! जैनुल भाई, आपका स्कोर: ' + score);
        startBtn.style.display = 'inline-block';
        startBtn.innerText = 'फिर से खेलें';
        mainImg.style.display = 'block'; // गेम खत्म होने पर फोटो वापस दिखाएं
        gameArea.style.display = 'none';
        scoreBoard.style.display = 'none';
    }
</script>

</body>
</html>
