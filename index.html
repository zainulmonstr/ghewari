<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghewari | Elite Professional Game</title>
    <style>
        /* CSS Variables for Consistency */
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --accent: #6366f1;
            --text-color: #ffffff;
        }

        * { box-sizing: border-box; touch-action: none; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden;
        }

        /* Responsive Wrapper to fix Orientation issues */
        #viewport {
            width: 95vw; height: 90vh;
            max-width: 600px;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: var(--glass-bg);
            border-radius: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }

        /* Screen Styles */
        .screen { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #game-screen { display: none; }

        .brand-title { font-size: 2rem; font-weight: 800; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); }
        .main-hero-img { width: 60%; max-width: 200px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 30px; }

        /* Game UI */
        #game-area {
            position: relative; width: 100%; height: 70%;
            background: rgba(0,0,0,0.2); border-radius: 15px;
            overflow: hidden; cursor: crosshair; margin-bottom: 10px;
        }
        .falling-item { position: absolute; width: 12%; max-width: 50px; pointer-events: none; }
        #basket {
            position: absolute; bottom: 10px; width: 20%; max-width: 100px;
            height: 15px; background: #fff; border-radius: 5px;
            box-shadow: 0 0 15px rgba(255,255,255,0.8);
        }

        #score-display { font-size: 2.5rem; font-weight: 900; margin-bottom: 10px; }
        .btn {
            background: linear-gradient(135deg, var(--accent), #ec4899);
            color: white; border: none; padding: 15px 40px; border-radius: 50px;
            font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
    </style>
</head>
<body>

<div id="viewport">
    <!-- START SCREEN -->
    <div id="start-screen" class="screen">
        <div class="brand-title">Made by Zainul</div>
        <img src="ghewari.png" alt="Ghewari" class="main-hero-img">
        <button class="btn" onclick="GameEngine.start()">START GAME 🚀</button>
    </div>

    <!-- GAME SCREEN -->
    <div id="game-screen" class="screen">
        <div id="score-display">0</div>
        <div id="game-area">
            <div id="basket"></div>
        </div>
    </div>
</div>

<script>
    const GameEngine = {
        score: 0,
        speed: 5,
        isRunning: false,
        audioCtx: new (window.AudioContext || window.webkitAudioContext)(),

        // Sound System
        playSound(type) {
            const osc = this.audioCtx.createOscillator();
            const gain = this.audioCtx.createGain();
            osc.connect(gain); gain.connect(this.audioCtx.destination);
            if(type === 'catch') { osc.frequency.value = 800; gain.gain.setValueAtTime(0.1, this.audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, this.audioCtx.currentTime + 0.1); }
            else { osc.type = 'sawtooth'; osc.frequency.value = 200; gain.gain.setValueAtTime(0.2, this.audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, this.audioCtx.currentTime + 0.5); }
            osc.start(); osc.stop(this.audioCtx.currentTime + (type === 'catch' ? 0.1 : 0.5));
        },

        // Initialization
        start() {
            if(this.audioCtx.state === 'suspended') this.audioCtx.resume();
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            this.score = 0; this.speed = 5; this.isRunning = true;
            this.gameLoop();
            this.spawn();
        },

        // Game Loop & Physics
        gameLoop() {
            if(!this.isRunning) return;
            requestAnimationFrame(() => this.gameLoop());
        },

        spawn() {
            if(!this.isRunning) return;
            const item = document.createElement('img');
            item.src = 'ghewari.png';
            item.className = 'falling-item';
            item.style.left = Math.random() * 80 + '%';
            item.style.top = '-10%';
            document.getElementById('game-area').appendChild(item);

            let posY = 0;
            const animate = () => {
                if(!this.isRunning) { item.remove(); return; }
                posY += this.speed;
                item.style.top = posY + 'px';

                // Precision Collision Detection
                const itemRect = item.getBoundingClientRect();
                const basketRect = document.getElementById('basket').getBoundingClientRect();

                if(itemRect.bottom >= basketRect.top && itemRect.right >= basketRect.left && itemRect.left <= basketRect.right) {
                    this.playSound('catch');
                    this.score++;
                    document.getElementById('score-display').innerText = this.score;
                    this.speed += 0.1;
                    item.remove();
                    return;
                }

                if(posY > document.getElementById('game-area').clientHeight) {
                    item.remove();
                    this.gameOver();
                } else {
                    requestAnimationFrame(animate);
                }
            };
            animate();
            setTimeout(() => this.spawn(), Math.max(300, 1000 - (this.score * 20)));
        },

        gameOver() {
            this.isRunning = false;
            this.playSound('over');
            alert("Game Over! Score: " + this.score);
            location.reload();
        }
    };

    // Controls
    const gameArea = document.getElementById('game-area');
    const basket = document.getElementById('basket');
    
    function updateBasket(e) {
        const rect = gameArea.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        let pos = ((clientX - rect.left) / rect.width) * 100;
        pos = Math.max(5, Math.min(95, pos));
        basket.style.left = pos + "%";
    }

    gameArea.addEventListener('mousemove', updateBasket);
    gameArea.addEventListener('touchmove', updateBasket);

</script>
</body>
</html>
