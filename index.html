<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghewari | Professional Game</title>
    <style>
        :root { --primary: #6366f1; --secondary: #ec4899; --bg: #0f172a; }
        body { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; touch-action: none; }
        .app-container { width: 100%; max-width: 500px; padding: 20px; text-align: center; }
        
        .brand { font-size: clamp(2rem, 8vw, 3rem); font-weight: 800; background: linear-gradient(to right, #6366f1, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }
        
        .big-image { width: 100%; max-width: 250px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); border: 4px solid rgba(255,255,255,0.1); margin-bottom: 20px; }

        #game-ui { display: none; width: 100%; height: 80vh; position: relative; }
        #game-area { position: relative; width: 100%; height: 100%; background: rgba(255,255,255,0.05); border-radius: 20px; border: 2px solid rgba(255,255,255,0.1); overflow: hidden; }

        .falling-item { width: 50px; height: 50px; position: absolute; }
        #basket { width: 100px; height: 25px; background: white; position: absolute; bottom: 20px; border-radius: 10px; box-shadow: 0 0 20px rgba(255,255,255,0.5); transition: left 0.1s ease-out; }

        #score-board { font-size: 3rem; font-weight: 900; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.3); }
        .btn { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border: none; padding: 15px 40px; border-radius: 50px; font-size: 1.2rem; cursor: pointer; transition: transform 0.2s; }
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div class="app-container" id="home-screen">
    <div class="brand">Made by Zainul</div>
    <img src="ghewari.png" alt="Ghewari" class="big-image">
    <button class="btn" onclick="startGame()">Start Game 🚀</button>
</div>

<div class="app-container" id="game-ui">
    <div id="score-board">0</div>
    <div id="game-area">
        <div id="basket"></div>
    </div>
</div>

<script>
    // Audio Context (Sound Engine)
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playSound(type) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        if (type === 'catch') {
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1000, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        } else {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.5);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
        }
        osc.start();
        osc.stop(audioCtx.currentTime + (type === 'catch' ? 0.1 : 0.5));
    }

    const homeScreen = document.getElementById('home-screen');
    const gameUI = document.getElementById('game-ui');
    const gameArea = document.getElementById('game-area');
    const basket = document.getElementById('basket');
    const scoreEl = document.getElementById('score-board');
    
    let score = 0;
    let isRunning = false;
    let speed = 4;

    function startGame() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        homeScreen.style.display = 'none';
        gameUI.style.display = 'block';
        score = 0;
        speed = 4;
        scoreEl.innerText = score;
        isRunning = true;
        spawnItems();
    }

    function moveBasket(e) {
        const areaRect = gameArea.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        let relativeX = ((clientX - areaRect.left) / areaRect.width) * 100;
        relativeX = Math.max(10, Math.min(90, relativeX));
        basket.style.left = relativeX + "%";
    }

    gameArea.addEventListener('mousemove', moveBasket);
    gameArea.addEventListener('touchmove', moveBasket);

    function spawnItems() {
        if (!isRunning) return;
        const item = document.createElement('img');
        item.src = 'ghewari.png';
        item.className = 'falling-item';
        item.style.left = Math.random() * 85 + "%";
        item.style.top = "-50px";
        gameArea.appendChild(item);

        let top = 0;
        function drop() {
            if (!isRunning) { item.remove(); return; }
            top += speed;
            item.style.top = top + "px";

            const itemRect = item.getBoundingClientRect();
            const basketRect = basket.getBoundingClientRect();

            // Precise Collision
            if (itemRect.bottom >= basketRect.top && 
                itemRect.right >= basketRect.left && 
                itemRect.left <= basketRect.right) {
                
                playSound('catch'); // कैच साउंड
                score++;
                scoreEl.innerText = score;
                speed += 0.2;
                item.remove();
                return;
            }

            if (top > gameArea.offsetHeight) {
                item.remove();
                endGame();
            } else {
                requestAnimationFrame(drop);
            }
        }
        drop();
        setTimeout(spawnItems, Math.max(400, 1200 - (score * 40)));
    }

    function endGame() {
        isRunning = false;
        playSound('over'); // गेम ओवर साउंड
        alert("Game Over! Final Score: " + score);
        location.reload();
    }
</script>
</body>
</html>
