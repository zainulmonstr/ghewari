<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ghewari Universe & Table</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; touch-action: manipulation; user-select: none; }
        body { background: radial-gradient(circle at center, #2b2b45, #11111c); color: white; overflow: hidden; width: 100vw; height: 100vh; }
        
        .screen { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; position: absolute; top: 0; left: 0; overflow-y: auto; padding-top: 60px;}
        .active { display: flex; }

        h1 { font-size: clamp(1.2rem, 3vw, 2rem); color: #00ffcc; text-transform: uppercase; letter-spacing: 3px; text-shadow: 0 0 10px rgba(0, 255, 204, 0.6); margin-bottom: 20px; }
        .side-brand { display: none; position: absolute; top: 50%; transform: translateY(-50%) rotate(-90deg); color: #00ffcc; font-size: 1.2rem; font-weight: bold; letter-spacing: 4px; text-transform: uppercase; z-index: 100; pointer-events: none; opacity: 0.5; }
        .left-brand { left: 10px; } .right-brand { right: 10px; }

        #mainGhewari { width: clamp(150px, 40vmin, 300px); cursor: pointer; transition: transform 1s ease-in-out; filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.2)); margin-bottom: 30px; }
        #mainGhewari.growing { transform: scale(1.4); }

        .btn-container { display: flex; flex-direction: column; gap: 10px; }
        button { background: linear-gradient(90deg, #ff007f, #ff7f00); border: none; color: white; font-size: 1rem; font-weight: bold; padding: 12px 25px; border-radius: 30px; cursor: pointer; }
        
        .back-btn { position: absolute; top: 20px; left: 20px; padding: 8px 15px; background: #444; border-radius: 20px; cursor: pointer; z-index: 9999; }

        /* Periodic Table Grid */
        #tableContainer { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; width: 95vw; margin: 20px auto; }
        .element { background: #333; padding: 5px; border-radius: 4px; text-align: center; font-size: 0.8rem; cursor: pointer; border: 1px solid #555; }
        .mystery { background: #ffcc00; color: #000; font-weight: bold; border: 2px solid white; }

        /* Games styles (kept from previous) */
        .score-board { font-size: 2rem; color: #ffd700; margin-bottom: 20px; }
        .game1-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 90vw; max-width: 300px; }
        .hole { background: #1a1a2e; border-radius: 50%; width: 80px; height: 80px; position: relative; border: 4px solid #0f0f1a; }
        .item { width: 100%; height: 100%; position: absolute; top: 100%; transition: top 0.2s; cursor: crosshair; }
        .item.up { top: 0; }
        canvas { background: #70c5ce; border: 4px solid #fff; border-radius: 10px; }

        @media (orientation: landscape) { h1 { display: none; } .side-brand { display: block; } }
    </style>
</head>
<body>

    <audio id="mainSound" src="ghewari.mp3" preload="auto"></audio>
    <div class="side-brand left-brand">Made by Zainul</div>
    <div class="side-brand right-brand">Made by Zainul</div>

    <!-- Home -->
    <div id="homeScreen" class="screen active">
        <h1>Made by Zainul</h1>
        <img src="ghewari.png" id="mainGhewari" alt="Main Ghewari">
        <div class="btn-container">
            <button onclick="startGame1()">Hit The Ghewari</button>
            <button onclick="startGame2()">Flappy Ghewari</button>
            <button onclick="showTable()">Periodic Table</button>
        </div>
    </div>

    <!-- Table Screen -->
    <div id="tableScreen" class="screen">
        <button class="back-btn" onclick="showHome()">⬅ BACK</button>
        <h2 style="margin-top:20px;">Periodic Table</h2>
        <div id="tableContainer"></div>
    </div>

    <!-- Game 1 -->
    <div id="game1Screen" class="screen">
        <button class="back-btn" onclick="showHome()">⬅ BACK</button>
        <div class="score-board" id="score1">0</div>
        <div class="game1-container">
            <script>for(let i=0; i<9; i++) document.write('<div class="hole" id="hole-'+i+'"></div>');</script>
        </div>
    </div>

    <!-- Game 2 -->
    <div id="game2Screen" class="screen">
        <button class="back-btn" onclick="showHome()">⬅ BACK</button>
        <canvas id="flappyCanvas" width="300" height="400"></canvas>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        // --- Periodic Table Render ---
        const tableContainer = document.getElementById('tableContainer');
        for(let i=1; i<=118; i++) {
            const div = document.createElement('div');
            div.className = 'element';
            div.innerText = i;
            tableContainer.appendChild(div);
        }
        // Gurunathium (119)
        const g119 = document.createElement('div');
        g119.className = 'element mystery';
        g119.innerText = '?';
        g119.onclick = function() {
            this.innerText = '119 GURUNATHIUM';
            this.style.background = '#ff007f';
            playBeep();
        };
        tableContainer.appendChild(g119);

        // --- Core Logic ---
        function showHome() { 
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('homeScreen').classList.add('active'); 
        }
        function showTable() { 
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('tableScreen').classList.add('active');
        }

        // --- Sound & Animation Logic ---
        const mainSound = document.getElementById('mainSound');
        const mainGhewari = document.getElementById('mainGhewari');
        mainGhewari.addEventListener('click', () => {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            mainSound.currentTime = 0; mainSound.play().catch(e => {});
            mainGhewari.classList.add('growing');
            setTimeout(() => { mainGhewari.classList.remove('growing'); }, 2000);
        });

        function playBeep() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        function playExplosion() {
            const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.5, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
            const noise = audioCtx.createBufferSource(); noise.buffer = buffer;
            const gain = audioCtx.createGain(); gain.gain.setValueAtTime(0.5, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            noise.connect(gain); gain.connect(audioCtx.destination); noise.start();
        }

        // --- Game 1 ---
        let isGame1Playing = false;
        function startGame1() { 
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('game1Screen').classList.add('active');
            isGame1Playing = true; popItem();
        }
        function popItem() {
            if(!isGame1Playing) return;
            const hole = document.getElementById('hole-'+Math.floor(Math.random()*9));
            hole.innerHTML = '<div class="item" style="background:'+(Math.random()<0.2?'red':'green')+'" onclick="whack(this)"></div>';
            setTimeout(() => { hole.querySelector('.item')?.classList.add('up'); }, 10);
            setTimeout(popItem, 1000);
        }
        function whack(el) {
            if(el.style.backgroundColor === 'red') { playExplosion(); alert('BOOM!'); isGame1Playing = false; showHome(); }
            else { playBeep(); el.remove(); }
        }

        // --- Game 2 ---
        function startGame2() { 
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('game2Screen').classList.add('active');
        }
        function stopGame1() { isGame1Playing = false; }
        function stopGame2() {}
    </script>
</body>
</html>
