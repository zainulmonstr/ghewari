<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghewari Special Website</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        h1 { color: #2c3e50; }
        .main-image {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            margin-bottom: 20px;
        }
        #game-area {
            width: 100%;
            height: 400px;
            background-color: #e0f2f1;
            position: relative;
            overflow: hidden;
            border: 3px solid #009688;
            border-radius: 10px;
            cursor: crosshair;
            display: none; 
            margin: 20px auto 0 auto;
        }
        .falling-item {
            width: 50px;
            height: 50px;
            position: absolute;
            top: -50px;
            user-select: none;
        }
        #basket {
            width: 80px;
            height: 20px;
            background-color: #d32f2f;
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 5px;
        }
        #credit-msg {
            display: none; /* शुरुआत में छुपा रहेगा */
            font-size: 20px;
            font-weight: bold;
            color: #555;
            margin-top: 20px;
            padding: 10px;
            border-top: 2px solid #eee;
        }
        .btn {
            background-color: #009688;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>हमारी वेबसाइट पर आपका स्वागत है!</h1>
    <img src="ghewari.png" alt="Ghewari Image" class="main-image">

    <div id="score-board">स्कोर: <span id="score">0</span></div>
    <button class="btn" id="start-btn" onclick="startGame()">गेम चालू करें</button>

    <div id="game-area">
        <div id="basket"></div>
    </div>

    <!-- यह मैसेज गेम खत्म होने पर दिखेगा -->
    <p id="credit-msg">Made by Zainul</p>
</div>

<script>
    const gameArea = document.getElementById('game-area');
    const basket = document.getElementById('basket');
    const scoreDisplay = document.getElementById('score');
    const startBtn = document.getElementById('start-btn');
    const creditMsg = document.getElementById('credit-msg');

    let score = 0;
    let gameInterval;
    let isPlaying = false;
    let basketX = 300; // शुरुआत में बीच में

    gameArea.addEventListener('mousemove', (e) => {
        if (!isPlaying) return;
        const rect = gameArea.getBoundingClientRect();
        let relX = e.clientX - rect.left;
        if (relX < 40) relX = 40;
        if (relX > gameArea.offsetWidth - 40) relX = gameArea.offsetWidth - 40;
        basketX = relX;
        basket.style.left = (basketX - 40) + 'px';
    });

    function startGame() {
        if (isPlaying) return;
        isPlaying = true;
        score = 0;
        scoreDisplay.innerText = score;
        startBtn.style.display = 'none';
        creditMsg.style.display = 'none'; // गेम शुरू होने पर क्रेडिट छुपाएं
        gameArea.style.display = 'block';
        gameInterval = setInterval(createFallingImage, 1000);
    }

    function createFallingImage() {
        if (!isPlaying) return;
        const img = document.createElement('img');
        img.src = 'ghewari.png';
        img.classList.add('falling-item');
        const maxX = gameArea.offsetWidth - 50;
        img.style.left = Math.floor(Math.random() * maxX) + 'px';
        gameArea.appendChild(img);

        let posY = -50;
        function fall() {
            if (!isPlaying) { img.remove(); return; }
            posY += 5;
            img.style.top = posY + 'px';
            if (posY >= 350 && posY <= 380) {
                const imgLeft = parseInt(img.style.left);
                if (imgLeft + 25 >= (basketX - 40) && imgLeft <= (basketX + 40)) {
                    score++;
                    scoreDisplay.innerText = score;
                    img.remove();
                    return;
                }
            }
            if (posY > 400) { img.remove(); gameOver(); }
            else { requestAnimationFrame(fall); }
        }
        requestAnimationFrame(fall);
    }

    function gameOver() {
        isPlaying = false;
        clearInterval(gameInterval);
        alert('गेम ओवर! आपका फाइनल स्कोर: ' + score);
        
        startBtn.style.display = 'inline-block';
        startBtn.innerText = 'फिर से खेलें';
        gameArea.style.display = 'none';
        
        // यहाँ "Made by Zainul" दिखाएंगे
        creditMsg.style.display = 'block'; 
    }
</script>

</body>
</html>
