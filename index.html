<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ghewari Game</title>
    <style>
        /* Modern UI & Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: manipulation; /* Mobile pe double-tap zoom rokne ke liye */
        }

        body {
            background: linear-gradient(135deg, #1e1e2f, #2a2a4a);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            padding: 20px 10px;
        }

        /* Made by Zainul Header */
        header {
            font-size: clamp(1.2rem, 3vw, 2rem);
            font-weight: 700;
            color: #00d2ff;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.5);
            margin-top: 2vh;
        }

        /* Bada Score Display */
        #scoreBoard {
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 900;
            color: #ffcc00;
            text-shadow: 4px 4px 0px #ff3366, 0 0 20px rgba(255, 204, 0, 0.6);
            margin: 2vh 0;
            z-index: 10;
        }

        /* Image Container & Animation */
        .game-area {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        #gameImage {
            width: clamp(150px, 40vmin, 400px); /* Screen ke hisaab se auto adjust */
            height: auto;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
            transition: transform 0.1s ease-out;
            user-select: none;
            -webkit-user-drag: none;
        }

        /* Game start hone pe ghumne ka animation */
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .spin-anim {
            animation: spin 5s linear infinite; /* Shuru me 5 second me ek chakkkar (Dhire) */
        }

        /* Click karne par bounce effect */
        .click-pop {
            transform: scale(0.9) !important;
        }

        /* Start Button */
        #startBtn {
            background: linear-gradient(90deg, #ff3366, #ff9933);
            border: none;
            color: white;
            font-size: clamp(1.2rem, 4vw, 2rem);
            font-weight: bold;
            padding: 15px 40px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 51, 102, 0.4);
            transition: all 0.3s ease;
            margin-bottom: 3vh;
            text-transform: uppercase;
        }

        #startBtn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 25px rgba(255, 51, 102, 0.6);
        }

        #startBtn:active {
            transform: translateY(2px);
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header>Made by Zainul</header>

    <!-- Score -->
    <div id="scoreBoard">0</div>

    <!-- Main Game Image -->
    <div class="game-area">
        <img src="ghewari.png" id="gameImage" alt="Ghewari">
    </div>

    <!-- Start Button -->
    <button id="startBtn">Start Game</button>

    <!-- Audio File -->
    <audio id="tapSound" src="ghewari.mp3" preload="auto"></audio>

    <script>
        const gameImage = document.getElementById('gameImage');
        const scoreBoard = document.getElementById('scoreBoard');
        const startBtn = document.getElementById('startBtn');
        const tapSound = document.getElementById('tapSound');

        let score = 0;
        let isPlaying = false;
        let currentSpinDuration = 5; // Shuru me dhire ghumega (5 seconds)

        // Game Start Logic
        startBtn.addEventListener('click', () => {
            score = 0;
            scoreBoard.innerText = score;
            isPlaying = true;
            currentSpinDuration = 5;
            
            // Image ghumna shuru
            gameImage.classList.add('spin-anim');
            gameImage.style.animationDuration = currentSpinDuration + 's';
            
            // Button ka text change
            startBtn.innerText = "Restart Game";
            
            // Optional: Button ko thoda light ya chota kar sakte hain taaki focus game pe rahe
            startBtn.style.opacity = "0.7";
        });

        // Image Click (Tap) Logic
        gameImage.addEventListener('mousedown', handleTap);
        gameImage.addEventListener('touchstart', (e) => {
            e.preventDefault(); // Mobile pe extra zoom/scroll rokne ke liye
            handleTap();
        });

        function handleTap() {
            if (!isPlaying) return; // Agar game start nahi hua to kuch mat karo

            // 1. Score badhao
            score++;
            scoreBoard.innerText = score;

            // 2. Sound bajao (ghewari.mp3)
            tapSound.currentTime = 0; // Taki jaldi jaldi tap karne pe sound repeat ho sake
            tapSound.play().catch(e => console.log("Sound play error (browser policy):", e));

            // 3. Speed Tez Karo (Animation duration kam karke)
            if (currentSpinDuration > 0.3) { 
                currentSpinDuration -= 0.15; // Har tap pe thoda tez hoga
                gameImage.style.animationDuration = currentSpinDuration + 's';
            }

            // 4. Click Pop Effect (Maza aane ke liye)
            gameImage.classList.add('click-pop');
            setTimeout(() => {
                gameImage.classList.remove('click-pop');
            }, 100); // 100ms ke baad bounce back hoga
        }
    </script>
</body>
</html>
