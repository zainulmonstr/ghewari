<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghewari Special Game</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f0f0f0; margin: 0; padding: 20px; }
        
        /* स्क्रीन के दो हिस्से */
        #image-screen { display: block; }
        #game-screen { display: none; }

        .brand-credit { font-size: 35px; font-weight: 900; color: #ff4b2b; margin-bottom: 20px; }
        
        /* बड़ी इमेज */
        .big-image { width: 90%; max-width: 400px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); margin-bottom: 30px; }

        /* बटन */
        .btn { background-color: #2196f3; color: white; padding: 15px 40px; border: none; border-radius: 30px; font-size: 20px; cursor: pointer; }

        /* गेम एरिया */
        #game-area { width: 100%; max-width: 400px; height: 400px; background-color: white; position: relative; overflow: hidden; border: 4px solid #333; margin: 0 auto; touch-action: none; }
        .falling-item { width: 50px; height: 50px; position: absolute; top: -50px; }
        #basket { width: 100px; height: 20px; background-color: #ff4757; position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); border-radius: 5px; }
        #score-board { font-size: 24px; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

<!-- इमेज और स्टार्ट बटन वाली स्क्रीन -->
<div id="image-screen">
    <div class="brand-credit">Made by Zainul</div>
    <img src="ghewari.png" alt="Ghewari" class="big-image">
    <br>
    <button class="btn" onclick="startCountdown()">गेम स्टार्ट करें 🎮</button>
</div>

<!-- गेम खेलने वाली स्क्रीन -->
<div id="game-screen">
    <div id="score-board">स्कोर: <span id="score">0</span></div>
    <div id="game-area">
        <div id="basket"></div>
        <div id="countdown" style="position: absolute; top: 40%; width: 100%; font-size: 50px; font-weight: bold;"></div>
    </div>
</div>

<script>
    const imageScreen = document.getElementById('image-screen');
    const gameScreen = document.getElementById('game-screen');
    const gameArea = document.getElementById('game-area');
    const basket = document.getElementById('basket');
    const scoreDisplay = document.getElementById('score');
    const countdownEl = document.getElementById('countdown');

    let score = 0;
    let isPlaying = false;
    let basketX = 200;
    let fallingSpeed = 5;

    // गेम शुरू करने का फंक्शन
    function startCountdown() {
        imageScreen.style.display = 'none';
        gameScreen.style.display = 'block';
        countdownEl.style.display = 'block';
        
        let count = 3;
        countdownEl.innerText = count;
        
        let timer = setInterval(() => {
            count--;
            if (count > 0) countdownEl.innerText = count;
            else if (count === 0) countdownEl.innerText = "GO!";
            else { 
                clearInterval(timer); 
                countdownEl.style.display = 'none'; 
                initGame(); 
            }
        }, 1000);
    }

    function initGame() {
        isPlaying = true;
        score = 0;
        fallingSpeed = 5;
        scoreDisplay.innerText = score;
        setInterval(createFallingItem, 1000);
    }

    // स्मूथ ड्रैग मूवमेंट
    gameArea.addEventListener('mousemove', (e) => {
        if(!isPlaying) return;
        const rect = gameArea.getBoundingClientRect();
        let x = e.clientX - rect.left;
        updateBasket(x);
    });

    gameArea.addEventListener('touchmove', (e) => {
        if(!isPlaying) return;
        const rect = gameArea.getBoundingClientRect();
        let x = e.touches[0].clientX - rect.left;
        updateBasket(x);
    });

    function updateBasket(x) {
        const half = 50; // बास्केट की आधी चौड़ाई
        if(x < half) x = half;
        if(x > gameArea.offsetWidth - half) x = gameArea.offsetWidth - half;
        basketX = x;
        basket.style.left = (basketX - 50) + 'px';
    }

    function createFallingItem() {
        if (!isPlaying) return;
        const img = document.createElement('img');
        img.src = 'ghewari.png';
        img.classList.add('falling-item');
        
        const maxX = gameArea.offsetWidth - 50;
        let startX = Math.floor(Math.random() * maxX);
        img.style.left = startX + 'px';
        gameArea.appendChild(img);

        let posY = -50;
        
        function fall() {
            if (!isPlaying) { img.remove(); return; }
            posY += fallingSpeed;
            img.style.top = posY + 'px';

            // कोलाइडर (Collision Logic) - एकदम सटीक
            // बास्केट की पोजीशन: bottom 10px, height 20px
            // मतलब बास्केट 370px से 390px के बीच है
            if (posY >= 330 && posY <= 380) {
                let imgLeft = parseInt(img.style.left);
                let imgRight = imgLeft + 50;
                let basketLeft = basketX - 50;
                let basketRight = basketX + 50;

                // अगर इमेज का हिस्सा बास्केट के अंदर है
                if (imgRight > basketLeft && imgLeft < basketRight) {
                    score++;
                    scoreDisplay.innerText = score;
                    if(score % 2 === 0) fallingSpeed += 0.2; // धीरे-धीरे स्पीड बढ़ाएं
                    img.remove();
                    return;
                }
            }

            if (posY > 400) { 
                img.remove(); 
                alert("गेम ओवर! स्कोर: " + score);
                location.reload(); // पेज रीसेट करें
            } else {
                requestAnimationFrame(fall);
            }
        }
        fall();
    }
</script>

</body>
</html>
